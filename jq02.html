<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <title>event</title>
</head>
<body>
    <p>
        <input type="text" name="" id="myinput">
    </p>

    <p>
        <button type="button" id="mybtn">mybtn</button>
    </p>

    <span id="myspan"></span>

    <script>
        $(document).ready(function(){
        const mybtn   = $('#mybtn');
        const myinput = $('#myinput');
        const myspan  = $('#myspan');

        console.log('mybtn  ',mybtn  );
        console.log('myinput',myinput); 
        console.log('myspan ',myspan );

        myinput.change(function(e){
            console.log('input change ok');
            let getinput = myinput.val();
            console.log('input',getinput);
            myspan.text(getinput);
        });
    });

    </script>
</body>
</html>
